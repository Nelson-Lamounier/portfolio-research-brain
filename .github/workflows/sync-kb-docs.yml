# @format
# @description Validate, sync wiki pages to S3, and trigger Bedrock KB ingestion.
#
# Two S3 prefixes are written on every run:
#   kb-docs/         → Bedrock Knowledge Base source (original pages + .metadata.json sidecars)
#   portfolio-docs/  → Portfolio-doc build source (wikilinks transformed, flat slug names)
#
# Bedrock ingestion is triggered after S3 sync to re-index Pinecone.
#
# Prerequisites (deployed by CDK Bedrock stacks):
#   - S3 bucket:       WIKI_S3_BUCKET GitHub variable
#   - Knowledge Base:  /bedrock-dev/knowledge-base-id  (SSM)

name: Sync KB Docs

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "index.md"
      - "articles-draft/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print actions, no S3 upload or ingestion)"
        required: false
        default: "false"
        type: boolean
      article-slug:
        description: >
          Optional article slug to trigger KB-augmented generation.
          Leave empty to skip. Example: self-managed-kubernetes-on-aws-with-cdk
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: sync-kb-docs-${{ github.ref_name }}
  cancel-in-progress: false # never cancel a mid-flight S3 sync

jobs:
  sync-and-ingest:
    name: Validate, Sync & Ingest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # needed for git diff HEAD~1

      # -----------------------------------------------------------------
      # Detect article slug: from dispatch input OR from changed files
      # -----------------------------------------------------------------
      - name: Detect article slug
        id: detect-slug
        env:
          INPUT_SLUG: ${{ inputs.article-slug }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SLUG=""
          if [ -n "${INPUT_SLUG}" ]; then
            SLUG="${INPUT_SLUG}"
          elif [ "${EVENT_NAME}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'articles-draft/*.md' | head -1)
            if [ -n "${CHANGED}" ]; then
              SLUG=$(basename "${CHANGED}" .md)
            fi
          fi
          if [ -n "${SLUG}" ]; then
            echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
            echo "has-slug=true" >> "$GITHUB_OUTPUT"
            echo "Article slug detected: ${SLUG}"
          else
            echo "has-slug=false" >> "$GITHUB_OUTPUT"
            echo "No article slug — upload step will be skipped."
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------
      # Step 1: Validate wiki document quality
      # -----------------------------------------------------------------
      - name: Validate wiki document quality
        run: |
          echo "Validating wiki/ pages..."
          ERRORS=0
          WARNINGS=0

          WIKI_FILES=$(find wiki/ -name '*.md')

          for f in $WIKI_FILES; do

            # --- Check 1: Minimum file size ---
            SIZE=$(wc -c < "$f" | tr -d ' ')
            if [ "$SIZE" -lt 300 ]; then
              echo "::error file=$f::Wiki page too small (${SIZE} bytes < 300 min). Enrich before syncing."
              ERRORS=$((ERRORS + 1))
            fi

            # --- Check 2: YAML frontmatter presence ---
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::Missing YAML frontmatter. All wiki pages require structured metadata."
              ERRORS=$((ERRORS + 1))
            fi

            # --- Check 3: At least one section heading (not a stub) ---
            if ! grep -q '^## ' "$f"; then
              echo "::warning file=$f::No section headings found — page may be a stub."
              WARNINGS=$((WARNINGS + 1))
            fi

            # --- Check 4: Unfilled placeholder sections ---
            if grep -qE '^\s*<!--.*(TODO|Fill in|TBD|Placeholder|Describe)' "$f"; then
              echo "::warning file=$f::Contains unfilled placeholder sections — enrich before publishing."
              WARNINGS=$((WARNINGS + 1))
            fi

            # --- Check 5: Staleness detection (>90 days via updated: frontmatter) ---
            LAST_UPDATED=$(grep '^updated:' "$f" | head -1 | sed 's/updated: *"\{0,1\}\([0-9-]*\)"\{0,1\}.*/\1/')
            if [ -n "$LAST_UPDATED" ]; then
              DOC_EPOCH=$(date -d "$LAST_UPDATED" +%s 2>/dev/null || echo "0")
              if [ "$DOC_EPOCH" -gt 0 ]; then
                DAYS_OLD=$(( ($(date +%s) - DOC_EPOCH) / 86400 ))
                if [ "$DAYS_OLD" -gt 90 ]; then
                  echo "::warning file=$f::Page is ${DAYS_OLD} days old (updated: ${LAST_UPDATED}). Consider reviewing."
                  WARNINGS=$((WARNINGS + 1))
                fi
              fi
            fi

          done

          PAGE_COUNT=$(echo "$WIKI_FILES" | wc -l | tr -d ' ')
          echo ""
          echo "=== Validation Summary ==="
          echo "  Pages checked: ${PAGE_COUNT}"
          echo "  Errors:        ${ERRORS}"
          echo "  Warnings:      ${WARNINGS}"

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::${ERRORS} wiki page(s) failed validation. Fix errors before syncing."
            exit 1
          fi
          echo "✅ All wiki pages passed validation."

      # -----------------------------------------------------------------
      # Step 2: Sync wiki pages to S3 (via sync-wiki.py)
      # -----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync wiki to S3
        id: sync
        env:
          WIKI_S3_BUCKET: ${{ vars.WIKI_S3_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: |
          python3 scripts/sync-wiki.py
          echo "bucket-name=${{ vars.WIKI_S3_BUCKET }}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------
      # Step 3: Trigger Bedrock KB ingestion (re-index Pinecone)
      # -----------------------------------------------------------------
      - name: Trigger KB ingestion (re-index Pinecone)
        if: inputs.dry_run != 'true'
        id: ingest
        run: |
          KB_ID=$(aws ssm get-parameter \
            --name "/bedrock-dev/knowledge-base-id" \
            --query "Parameter.Value" \
            --output text)
          DS_ID=$(aws bedrock-agent list-data-sources \
            --knowledge-base-id "${KB_ID}" \
            --query "dataSourceSummaries[0].dataSourceId" \
            --output text)
          echo "Triggering ingestion for KB=${KB_ID}, DS=${DS_ID}"

          JOB_ID=$(aws bedrock-agent start-ingestion-job \
            --knowledge-base-id "${KB_ID}" \
            --data-source-id "${DS_ID}" \
            --query "ingestionJob.ingestionJobId" \
            --output text)
          echo "Ingestion job started: ${JOB_ID}"

          # Poll until complete (5 min timeout — 30 × 10 s)
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws bedrock-agent get-ingestion-job \
              --knowledge-base-id "${KB_ID}" \
              --data-source-id "${DS_ID}" \
              --ingestion-job-id "${JOB_ID}" \
              --query "ingestionJob.status" \
              --output text)
            echo "Ingestion status (${i}/30): ${STATUS}"
            if [ "${STATUS}" = "COMPLETE" ]; then
              echo "✅ KB ingestion complete"
              break
            elif [ "${STATUS}" = "FAILED" ]; then
              echo "❌ KB ingestion failed"
              exit 1
            fi
          done

      # -----------------------------------------------------------------
      # Step 4: Optional — upload article brief for KB-augmented generation
      # Runs when a slug is detected — either from workflow_dispatch input
      # or from a pushed change inside articles-draft/
      # -----------------------------------------------------------------
      - name: Upload article brief to S3
        if: steps.detect-slug.outputs.has-slug == 'true' && inputs.dry_run != 'true'
        env:
          SLUG: ${{ steps.detect-slug.outputs.slug }}
          BUCKET_NAME: ${{ steps.sync.outputs.bucket-name }}
        run: |
          BRIEF="articles-draft/${SLUG}.md"

          if [ ! -f "${BRIEF}" ]; then
            echo "::error::Brief not found: ${BRIEF}"
            echo "Available briefs:"
            ls -1 articles-draft/*.md 2>/dev/null || echo "  (none)"
            exit 1
          fi

          echo "Uploading brief: ${BRIEF} ($(wc -c < "${BRIEF}" | tr -d ' ') bytes)"
          aws s3 cp "${BRIEF}" "s3://${BUCKET_NAME}/drafts/${SLUG}.md"
          echo "✅ Brief uploaded — Lambda should trigger shortly"

      # -----------------------------------------------------------------
      # Step 5: Trigger portfolio-doc rebuild
      # Requires: PORTFOLIO_DOC_DEPLOY_TOKEN secret — PAT with
      # repo scope on Nelson-Lamounier/portfolio-doc
      # -----------------------------------------------------------------
      - name: Trigger portfolio-doc rebuild
        if: inputs.dry_run != 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PORTFOLIO_DOC_DEPLOY_TOKEN }}
          repository: Nelson-Lamounier/portfolio-doc
          event-type: wiki-updated
          client-payload: '{"sha": "${{ github.sha }}"}'

      # -----------------------------------------------------------------
      # Step summary
      # -----------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "## Wiki Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Bucket** | \`${{ vars.WIKI_S3_BUCKET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bedrock KB prefix** | \`kb-docs/\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Portfolio-doc prefix** | \`portfolio-docs/\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry run** | \`${{ inputs.dry_run || 'false' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
